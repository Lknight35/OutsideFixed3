name: Auto-Merge on Status Success

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]
  status: {}

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.action != 'opened'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable auto-merge for PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Find the PR
            let pr_number = null;

            if (context.eventName === 'pull_request') {
              pr_number = context.issue.number;
            } else if (context.eventName === 'status' || context.eventName === 'check_suite') {
              // Find PR by commit SHA
              const prs = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                per_page: 100
              });

              const sha = context.sha;
              const matchedPr = prs.data.find(pr => pr.head.sha === sha);
              pr_number = matchedPr?.number;
            }

            if (!pr_number) {
              console.log('No PR found for this commit');
              return;
            }

            // Get PR details
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr_number
            });

            console.log(`Found PR #${pr_number}: ${pr.data.title}`);

            // Check if all required status checks pass
            const statuses = await github.rest.repos.getCombinedStatusForRef({
              owner,
              repo,
              ref: pr.data.head.sha
            });

            console.log(`Status state: ${statuses.data.state}`);
            console.log(`Statuses:`, statuses.data.statuses.map(s => ({ context: s.context, state: s.state })));

            if (statuses.data.state !== 'success') {
              console.log('Not all checks passed yet, skipping merge');
              return;
            }

            // Check if PR is approved
            const reviews = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: pr_number
            });

            const hasApproval = reviews.data.some(review => review.state === 'APPROVED');
            const hasRequestedChanges = reviews.data.some(review => review.state === 'CHANGES_REQUESTED');

            if (hasRequestedChanges) {
              console.log('PR has requested changes, skipping merge');
              return;
            }

            if (pr.data.draft) {
              console.log('PR is still a draft, skipping merge');
              return;
            }

            console.log(`Merging PR #${pr_number}...`);

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pr_number,
                merge_method: 'squash',
                commit_title: `${pr.data.title}`,
                commit_message: pr.data.body || ''
              });

              console.log(`✅ Successfully merged PR #${pr_number}`);
            } catch (error) {
              console.log(`⚠️ Merge failed: ${error.message}`);
              if (error.message.includes('Pull Request is not mergeable')) {
                console.log('PR has merge conflicts or other issues preventing merge');
              }
            }
